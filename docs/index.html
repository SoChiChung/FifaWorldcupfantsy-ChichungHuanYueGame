<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫葱酱的大逃杀联赛</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>紫葱酱的大逃杀联赛</h1>
    <div class="subtitle">FIFA World Cup Fantasy · Battle Royale</div>
    <div id="roundInfo">加载中...</div>
  </header>

  <div id="content" class="loading">正在加载数据...</div>

  <footer>
    <div class="social-label">关注紫葱酱</div>
    <div class="social-links">
      <a href="https://space.bilibili.com/3150672"><img src="img/bilibili.webp" alt="">紫葱酱</a>
      <a href="https://weibo.com/u/5614808845"><img src="img/sina-weibo.webp" alt="">紫葱酱</a>
      <a ><img src="img/wechat-logo.webp" alt="">FPL紫葱酱</a>
      <a ><img src="img/xhs.webp" alt="">FPL紫葱酱</a>
    </div>
  </footer>
</div>

<script>
(async function() {
  try {
    const [resResult, resPlayers] = await Promise.all([
      fetch('data/result.json'),
      fetch('data/huanyue.json')
    ]);

    if (!resResult.ok) throw new Error('HTTP ' + resResult.status);
    if (!resPlayers.ok) throw new Error('HTTP ' + resPlayers.status);

    const allResults = await resResult.json();
    const huanyue = await resPlayers.json();

    const roundIds = Object.keys(allResults).sort((a, b) => Number(b) - Number(a));
    if (roundIds.length === 0) {
      document.getElementById('content').innerHTML = '<p class="empty">暂无数据</p>';
      return;
    }

    const currentRoundId = roundIds[0];
    const result = allResults[currentRoundId];

    const eliminatedSet = new Set();
    for (const rid of roundIds) {
      for (const e of (allResults[rid].eliminated || [])) {
        eliminatedSet.add(e.userId);
      }
    }

    const nameMap = {};
    for (const p of huanyue) {
      nameMap[p.userId] = p.userName;
    }

    function metricLabel(result) {
      const r = result.ranking[0] || {};
      if ('totalST' in r) return '射正 (ST)';
      if ('points' in r) return '得分';
      return '数据';
    }

    document.getElementById('roundInfo').innerHTML =
      '<br><span class="round-badge">Round ' + currentRoundId + '</span>' +
      '<div class="desc">' + (result.description || result.title || '') + '</div>';

    let html = '';

    // ── Round 7: Group Stage ──
    if (currentRoundId === '7' && result.groups) {
      var bonuses = (result.extra && result.extra.teamBonuses) || {};
      var isPreview = result.extra && result.extra.preview;
      var groupNames = Object.keys(result.groups).sort();

      if (isPreview) {
        html += '<div class="preview-banner">比赛尚未开始，以下为本轮分组预览。分数将在比赛日更新。</div>';
      }

      html += '<div class="group-switcher" role="tablist" aria-label="Round 7 groups">';
      groupNames.forEach(function(g, idx) {
        html += '<button type="button" class="group-switch ' + (idx === 0 ? 'active' : '') + '" data-group="' + g + '" role="tab" aria-selected="' + (idx === 0 ? 'true' : 'false') + '">Group ' + g + '</button>';
      });
      html += '</div>';

      html += '<div class="groups-grid groups-carousel">';
      groupNames.forEach(function(g) {
        var members = result.groups[g];
        html += '<div class="group-card ' + (isPreview ? 'preview-card' : 'live-card') + ' ' + (g === groupNames[0] ? 'active' : '') + '" data-group-panel="' + g + '" aria-hidden="' + (g === groupNames[0] ? 'false' : 'true') + '">';
        html += '<div class="group-header">Group ' + g + '</div>';
        html += '<table><thead><tr>';
        html += '<th>Seed</th><th>玩家</th><th>球队</th>';
        if (!isPreview) { html += '<th>基础</th><th>加成</th><th>总分</th>'; }
        html += '<th></th>';
        html += '</tr></thead><tbody>';

        members.forEach(function(p) {
          var isQualified = p.qualified;
          html += '<tr class="' + (isQualified ? 'qualified' : '') + '">';
          html += '<td class="seed">' + p.seed + '</td>';
          html += '<td>' + (p.userName || nameMap[p.userId] || p.userId) + '</td>';
          html += '<td><span class="team-tag">' + p.assignedTeam + '</span></td>';
          if (!isPreview) {
            html += '<td class="metric">' + (p.roundPoints || 0) + '</td>';
            html += '<td class="bonus">+' + (p.bonus || 0) + '</td>';
            html += '<td class="metric' + (isQualified ? ' qualified-score' : '') + '">' + (p.finalPoints || 0) + '</td>';
          }
          html += '<td>' + (isQualified ? '<span class="qualified-tag">晋级</span>' : '') + '</td>';
          html += '</tr>';
        });

        html += '</tbody></table></div>';
      });
      html += '</div>';
    } else if (currentRoundId === '8' && result.ranking) {
      var round8Preview = result.extra && result.extra.preview;
      var round8Warning = result.extra && result.extra.warning;
      if (round8Preview) {
        html += '<div class="preview-banner final-preview-banner">FIFA 尚未返回第八轮数据，当前分数暂按 0 处理。</div>';
      }
      if (round8Warning) {
        html += '<div class="warning-banner">' + round8Warning + '</div>';
      }
      html += '<div class="section ranking-stage round8-stage"><h2>Round 8 最终排名</h2>';
      html += '<div class="table-scroll"><table><thead><tr>';
      html += '<th>#</th><th>玩家</th><th>本轮</th><th>Winning Goal</th><th>最终分</th><th>队长分</th><th>总分</th><th>冠军首发</th>';
      html += '</tr></thead><tbody>';
      result.ranking.forEach(function(r) {
        var medal = r.rank <= 3 ? ' podium-' + r.rank : '';
        html += '<tr class="round8-row' + medal + '">';
        html += '<td class="rank">' + r.rank + '</td>';
        html += '<td class="player-name">' + (r.userName || nameMap[r.userId] || r.userId) + '</td>';
        html += '<td class="metric muted-score">' + r.basePoints + '</td>';
        html += '<td class="bonus">' + (r.winningGoalBonus ? '+' + r.winningGoalBonus : '-') + '</td>';
        html += '<td class="metric final-score">' + r.finalPoints + '</td>';
        html += '<td class="metric">' + r.captainPoints + '</td>';
        html += '<td class="metric">' + r.overallPoints + '</td>';
        html += '<td class="metric">' + r.championStarterCount + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      html += '<div class="round8-rules">9 名玩家按最终得分排名：本轮基础得分加 Winning Goal 加分；同分依次比较队长本轮得分、冠军队伍首发人数、总分。</div>';
    } else {
      // ── Other Rounds: Leaderboard table ──
      var label = metricLabel(result);
      html += '<div class="section"><h2>积分榜</h2><table><thead><tr>';
      html += '<th>#</th><th>玩家</th><th>' + label + '</th><th></th>';
      html += '</tr></thead><tbody>';

      (result.ranking || []).forEach(function(r, i) {
        var isDead = eliminatedSet.has(r.userId);
        var metricKey = Object.keys(r).find(function(k) { return k !== 'userId' && k !== 'userName' && k !== 'rank'; }) || 'points';
        html += '<tr class="' + (isDead ? 'eliminated' : '') + '">';
        html += '<td class="rank">' + (i + 1) + '</td>';
        html += '<td>' + (r.userName || nameMap[r.userId] || r.userId) + '</td>';
        html += '<td class="metric">' + (r[metricKey] != null ? r[metricKey] : '-') + '</td>';
        html += '<td>' + (isDead ? '<span class="eliminated-tag">淘汰</span>' : '') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // ── Intro ──
    html += '<div class="intro">' +
      '<img class="deco-bat" src="img/bangbang.webp" alt="" loading="lazy">'+
      '<h2>什么是紫葱酱的大逃杀联赛？</h2>' +
      '<p>还在算总分？还在拼排名？还在研究这一轮到底该赢几分？</p>' +
      '<p>不好意思，这里不是传统范特西。</p>' +
      '<p>在大逃杀联赛里，每一轮都会公布一条全新的规则。今天可能比射正，明天可能比扑救，后天可能比助攻，下一轮说不定又变成后卫进球大战。没有人知道下一轮会发生什么，唯一确定的是——总有人会被淘汰。</p>' +
      '<p>这里没有一成不变的最优解，也没有永远正确的模板阵容。你不仅要会选人，更要学会适应规则、拥抱变化，在每一轮未知的挑战中努力活下去。</p>' +
      '<p>当然，我们也有自己的联赛宗旨：</p>' +
      '<p><strong>不追求赢，不追求输，不追求快乐，更不追求哭。</strong></p>' +
      '<p><strong>无论碰到什么规则，上去就是"砰砰两拳"。</strong></p>' +
      '<p>欢迎来到紫葱酱的大逃杀联赛。这里没有标准答案，只有意想不到的乐趣。</p>' +
      '</div>';

    document.getElementById('content').innerHTML = html;

    document.querySelectorAll('.group-switch').forEach(function(button) {
      button.addEventListener('click', function() {
        var group = button.getAttribute('data-group');
        document.querySelectorAll('.group-switch').forEach(function(b) {
          var isActive = b === button;
          b.classList.toggle('active', isActive);
          b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
        document.querySelectorAll('[data-group-panel]').forEach(function(panel) {
          var isActive = panel.getAttribute('data-group-panel') === group;
          panel.classList.toggle('active', isActive);
          panel.setAttribute('aria-hidden', isActive ? 'false' : 'true');
        });
      });
    });

  } catch (err) {
    document.getElementById('content').innerHTML = '<p class="error">加载失败: ' + err.message + '</p>';
  }
})();
</script>
</body>
</html>
